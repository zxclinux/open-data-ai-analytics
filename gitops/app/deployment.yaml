apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: web:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: DB_PATH
              value: /app/data/petitions.db
            - name: PETITIONS_DIR
              value: /app/data/petitions
            - name: DATA_LOAD_URL
              value: http://data-load:8000
            - name: QUALITY_URL
              value: http://data-quality:8000
            - name: RESEARCH_URL
              value: http://data-research:8000
            - name: VIZ_URL
              value: http://visualization:8000
          volumeMounts:
            - name: data
              mountPath: /app/data
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 5
      volumes:
        - name: data
          hostPath:
            path: /opt/app-data
            type: DirectoryOrCreate
