#cloud-config
package_update: true
package_upgrade: true

packages:
  - ca-certificates
  - curl
  - git
  - gnupg

runcmd:
  # 1. Install k3s
  - curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="--disable=traefik --disable=servicelb --write-kubeconfig-mode=644" sh -
  - systemctl enable k3s
  - timeout 120 bash -c 'until kubectl get nodes 2>/dev/null | grep -q " Ready"; do sleep 5; done'
  - sleep 20

  # 2. Expose kubeconfig for admin user
  - mkdir -p /home/${admin_username}/.kube
  - cp /etc/rancher/k3s/k3s.yaml /home/${admin_username}/.kube/config
  - chown -R ${admin_username}:${admin_username} /home/${admin_username}/.kube
  - chmod 600 /home/${admin_username}/.kube/config
  - echo 'export KUBECONFIG=$HOME/.kube/config' >> /home/${admin_username}/.bashrc

  # 3. Install Docker
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" > /etc/apt/sources.list.d/docker.list
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin
  - systemctl enable --now docker
  - timeout 60 bash -c 'until docker info 2>/dev/null; do sleep 3; done'

  # 4. Clone repo and build all custom images
  - rm -rf /opt/open-data-ai-analytics
  - git clone --depth 1 --branch ${repo_branch} ${repo_url} /opt/open-data-ai-analytics
  - docker build -f /opt/open-data-ai-analytics/src/data_load/Dockerfile -t data-load:latest /opt/open-data-ai-analytics
  - docker build -f /opt/open-data-ai-analytics/src/data_quality_analysis/Dockerfile -t data-quality:latest /opt/open-data-ai-analytics
  - docker build -f /opt/open-data-ai-analytics/src/data_research/Dockerfile -t data-research:latest /opt/open-data-ai-analytics
  - docker build -f /opt/open-data-ai-analytics/src/visualization/Dockerfile -t visualization:latest /opt/open-data-ai-analytics
  - docker build -f /opt/open-data-ai-analytics/src/web/Dockerfile -t web:latest /opt/open-data-ai-analytics

  # 5. Import all images into k3s containerd
  - docker save data-load:latest | k3s ctr images import -
  - docker save data-quality:latest | k3s ctr images import -
  - docker save data-research:latest | k3s ctr images import -
  - docker save visualization:latest | k3s ctr images import -
  - docker save web:latest | k3s ctr images import -

  # 6. Install ArgoCD
  - kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
  - kubectl apply -n argocd --validate=false -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
  - timeout 600 bash -c 'until kubectl -n argocd get deployment argocd-server 2>/dev/null | grep -q "1/1"; do sleep 15; done'

  # 7. Expose ArgoCD UI on NodePort 30443
  - kubectl -n argocd patch svc argocd-server -p '{"spec":{"type":"NodePort","ports":[{"port":443,"targetPort":8080,"nodePort":30443,"protocol":"TCP","name":"https"}]}}'

  # 8. Apply ArgoCD Application
  - kubectl apply -f /opt/open-data-ai-analytics/gitops/argocd/application.yaml