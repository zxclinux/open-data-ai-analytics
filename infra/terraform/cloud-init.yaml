package_update: true
package_upgrade: true

packages:
  - ca-certificates
  - curl
  - git
  - gnupg
  - lsb-release

runcmd:
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" > /etc/apt/sources.list.d/docker.list
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
  - systemctl enable --now docker
  - usermod -aG docker ${admin_username}
  - rm -rf /opt/open-data-ai-analytics
  - git clone --depth 1 --branch ${repo_branch} ${repo_url} /opt/open-data-ai-analytics
  - |
    cat > /opt/open-data-ai-analytics/src/docker-compose.override.yml <<EOF
    services:
      web:
        ports:
          - "${web_port}:8000"
    EOF
  - /usr/bin/docker compose -f /opt/open-data-ai-analytics/src/docker-compose.yml -f /opt/open-data-ai-analytics/src/docker-compose.override.yml -p open-data-ai up -d --build
