#cloud-config
package_update: true
package_upgrade: true

packages:
  - ca-certificates
  - curl
  - git
  - gnupg
  - lsb-release

runcmd:
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" > /etc/apt/sources.list.d/docker.list
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
  - systemctl enable --now docker
  - usermod -aG docker ${admin_username}
  - rm -rf /opt/open-data-ai-analytics
  - |
    bash -lc 'set -euo pipefail
    REPO_DIR="/opt/open-data-ai-analytics"
    REPO_URL="${repo_url}"
    REPO_BRANCH="${repo_branch}"

    if ! git clone --depth 1 --branch "$REPO_BRANCH" "$REPO_URL" "$REPO_DIR"; then
      echo "Primary repo clone failed, trying public fallback..."
      git clone --depth 1 --branch "$REPO_BRANCH" "https://github.com/zxclinux/open-data-ai-analytics.git" "$REPO_DIR"
    fi

    test -f "$REPO_DIR/src/docker-compose.yml"

    cat > "$REPO_DIR/src/docker-compose.override.yml" <<EOF
    services:
      web:
        ports:
          - "${web_port}:8000"
    EOF

    /usr/bin/docker compose \
      -f "$REPO_DIR/src/docker-compose.yml" \
      -f "$REPO_DIR/src/docker-compose.override.yml" \
      -p open-data-ai up -d --build
    '
