name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      module:
        description: "Optional specific module to run"
        required: false
        default: ""

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [
          "data_load",
          "data_quality_analysis",
          "data_research",
          "visualization"
        ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare data directory
        run: mkdir -p data/raw

      - name: Skip this module if not selected
        if: ${{ github.event.inputs.module != '' && matrix.module != github.event.inputs.module }}
        run: |
          echo "Skipping ${{ matrix.module }}"
          exit 0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download dataset
        if: ${{ matrix.module == 'data_load' }}
        run: |
          echo "Downloading dataset for data_load"
          wget "https://data.gov.ua/dataset/8e2a1cc8-20e3-49f1-b9bf-b1c0372f4834/resource/3a7e8c48-3411-4b50-b45b-dd113fb6fce4/download/petitions.csv" \
            -O data/raw/petitions.csv || true

      - name: Run data_load
        if: ${{ matrix.module == 'data_load' }}
        run: |
          python -m src.pipelines.data_load \
            data/raw/petitions.csv

      - name: Run data_quality_analysis
        if: ${{ matrix.module == 'data_quality_analysis' }}
        run: |
          python -m src.pipelines.data_quality_analysis \
            data/raw/petitions.csv

      - name: Run data_research
        if: ${{ matrix.module == 'data_research' }}
        run: |
          python -m src.pipelines.data_research \
            data/raw/petitions.csv

      - name: Run visualization
        if: ${{ matrix.module == 'visualization' }}
        run: |
          python -m src.pipelines.visualization \
            data/raw/petitions.csv

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.module }}
          path: |
            reports/${{ matrix.module }}
