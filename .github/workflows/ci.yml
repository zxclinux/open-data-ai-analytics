name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      module:
        description: "Specify module to run (optional)"
        required: false
        default: ""

jobs:
  data_load:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Make data dir
        run: mkdir -p data/raw

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download dataset
        run: |
          wget "https://data.gov.ua/dataset/c89a8203-8f3a-486c-8117-9ca0dcd962a2/resource/858a5c20-872f-41c2-a1d5-394f4a894bc1/download/petitions.csv" \
            -O data/raw/petitions.csv || true

      - name: Run data_load
        run: |
          python -m src.pipelines.data_load data/raw/petitions.csv

      - name: Upload data artifact
        uses: actions/upload-artifact@v4
        with:
          name: raw-data
          path: data/raw/petitions.csv

  data_quality_analysis:
    needs: data_load
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download data
        uses: actions/download-artifact@v4
        with:
          name: raw-data
          path: data/raw

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run data_quality_analysis
        run: |
          python -m src.pipelines.data_quality_analysis data/raw/petitions.csv

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: quality-results
          path: reports/data_quality_analysis

  data_research:
    needs: data_load
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download data
        uses: actions/download-artifact@v4
        with:
          name: raw-data
          path: data/raw

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run data_research
        run: |
          python -m src.pipelines.data_research data/raw/petitions.csv

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: research-results
          path: reports/data_research

  visualization:
    needs: data_load
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download data
        uses: actions/download-artifact@v4
        with:
          name: raw-data
          path: data/raw

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run visualization
        run: |
          python -m src.pipelines.visualization data/raw/petitions.csv

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: visualization-results
          path: reports/visualization
