{% extends "base.html" %}
{% block title %}Home — Open Data Analytics{% endblock %}
{% block page_title %}Dashboard{% endblock %}

{% block topbar_actions %}
<button class="btn btn-green" id="btn-pipeline" onclick="runPipeline()">
  <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
    <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
  </svg>
  Load Data
  <span class="spinner" id="pipeline-spinner"></span>
</button>
<button class="btn btn-ghost btn-sm" id="btn-clear" onclick="clearDB()">Clear DB</button>
<span id="pipeline-status" class="status-text"></span>
{% endblock %}

{% block content %}

<!-- ── Petitions ─────────────────────────────────────────────────── -->
<div class="card" style="padding:0;overflow:hidden">
  <div style="display:flex;align-items:center;justify-content:space-between;padding:1rem 1.5rem;border-bottom:1px solid var(--border)">
    <span class="card-title" style="margin:0">Petitions</span>
    <span id="pet-total" style="font-size:.78rem;color:var(--text-secondary)"></span>
  </div>
  <div id="pet-result" style="min-height:120px"></div>
  <div id="pet-pagination" style="padding:.875rem 1.5rem;border-top:1px solid var(--border);display:none"></div>
</div>

<!-- ── Two-column row ─────────────────────────────────────────────── -->
<div class="grid-2col">

  <!-- Top by Signatures -->
  <div class="card" style="padding:0;overflow:hidden">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem;border-bottom:1px solid var(--border)">
      <span class="card-title" style="margin:0">Top Petitions</span>
      <div class="select-wrap">
        <select id="top-n" onchange="loadTop()">
          <option value="5">5</option>
          <option value="10" selected>10</option>
          <option value="25">25</option>
          <option value="50">50</option>
        </select>
      </div>
    </div>
    <div id="top-result" style="min-height:80px"></div>
  </div>

  <!-- By Status -->
  <div class="card" style="padding:0;overflow:hidden">
    <div style="padding:1rem 1.25rem;border-bottom:1px solid var(--border)">
      <span class="card-title" style="margin:0">Status Distribution</span>
    </div>
    <div id="status-result" style="min-height:80px"></div>
  </div>

</div>

<!-- ── Search ─────────────────────────────────────────────────────── -->
<div class="card">
  <div class="card-header" style="margin-bottom:.875rem">
    <span class="card-title">Search</span>
  </div>
  <div class="form-row" style="margin-bottom:0">
    <div class="form-group" style="flex:1;min-width:160px;position:relative">
      <label>Topic</label>
      <input type="text" id="search-q" placeholder="e.g. ремонт доріг" style="width:100%" autocomplete="off">
      <div id="ac-box" class="ac-box" hidden></div>
    </div>
    <div class="form-group">
      <label>Top results</label>
      <input type="number" id="search-limit" value="20" min="1" max="200" style="width:80px">
    </div>
    <button class="btn btn-primary" onclick="loadSearch()" style="margin-top:auto">
      <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
      </svg>
      Search
    </button>
  </div>
  <div id="search-result" style="margin-top:.875rem"></div>
</div>

<!-- ── Chart ──────────────────────────────────────────────────────── -->
<div class="card" style="padding:0;overflow:hidden">
  <div style="display:flex;align-items:center;justify-content:space-between;padding:1rem 1.5rem;border-bottom:1px solid var(--border)">
    <span class="card-title" style="margin:0">Chart</span>
    <div class="select-wrap">
      <select id="chart-name" onchange="showChart()">
        <option value="signatures_dist">Signatures distribution</option>
        <option value="median_by_kind">Median by kind</option>
        <option value="mean_median_by_kind">Mean &amp; median by kind</option>
        <option value="activity_by_year">Activity by year</option>
        <option value="duration_dist">Duration distribution</option>
        <option value="status_pie">Status pie</option>
      </select>
    </div>
  </div>
  <div id="chart-result" style="padding:1.25rem;min-height:100px"></div>
</div>

{% endblock %}

{% block scripts %}
<style>
  .ac-box {
    position: absolute;
    top: calc(100% + 2px);
    left: 0; right: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    z-index: 200;
    overflow: hidden;
  }

  .ac-item {
    padding: 0.5rem 0.75rem;
    font-size: 0.8125rem;
    cursor: pointer;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s, color 0.1s;
  }

  .ac-item:last-child { border-bottom: none; }

  .ac-item:hover,
  .ac-item.ac-active {
    background: var(--accent-light);
    color: var(--accent);
  }
</style>
<script>
function el(id) { return document.getElementById(id); }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function trunc(s, n) { s = String(s || ''); return s.length > n ? s.slice(0, n) + '…' : s; }

function statusBadge(s) {
  const ok = s === 'з відповіддю';
  return '<span class="badge ' + (ok ? 'badge-ok' : 'badge-no') + '">' + esc(s) + '</span>';
}

function loading(id) {
  el(id).innerHTML = '<p style="padding:1rem 1.5rem;color:var(--text-secondary);font-size:.8rem">Loading…</p>';
}

function errMsg(id, e) {
  el(id).innerHTML = '<div style="padding:1rem 1.5rem"><div class="alert alert-error">' + esc(String(e)) + '</div></div>';
}

// ── Petitions ──────────────────────────────────────────────────────

const PET_LIMIT = 10;
let petPage = 1;

async function loadPetitions(page) {
  page = page || 1;
  petPage = page;
  loading('pet-result');
  el('pet-pagination').style.display = 'none';
  const offset = (page - 1) * PET_LIMIT;
  try {
    const r = await fetch('/api/petitions?limit=' + PET_LIMIT + '&offset=' + offset);
    const d = await r.json();
    if (d.detail) throw d.detail;
    const rows = d.data || [];
    const total = d.total || 0;
    el('pet-total').textContent = total.toLocaleString() + ' total';
    el('pet-result').innerHTML = petitionsTable(rows);
    const totalPages = Math.ceil(total / PET_LIMIT);
    if (totalPages > 1) {
      el('pet-pagination').style.display = 'block';
      el('pet-pagination').innerHTML = renderPagination(page, totalPages, 'loadPetitions');
    }
  } catch (e) { errMsg('pet-result', e); }
}

function petitionsTable(rows) {
  if (!rows.length) return '<p style="padding:1rem 1.5rem;color:var(--text-secondary);font-size:.8rem">No data. Click "Load Data" to fetch petitions.</p>';
  let h = '<div class="overflow-table"><table><thead><tr>';
  h += '<th style="width:80px">UID</th><th>Kind</th><th>Title</th><th style="text-align:right">Signatures</th><th>Status</th><th>Date</th>';
  h += '</tr></thead><tbody>';
  for (const r of rows) {
    h += '<tr>';
    h += '<td style="color:var(--text-secondary)">' + esc(r.uid) + '</td>';
    h += '<td>' + esc(r.kind) + '</td>';
    h += '<td>' + esc(trunc(r.title, 72)) + '</td>';
    h += '<td style="text-align:right;font-weight:600">' + Number(r.count).toLocaleString() + '</td>';
    h += '<td>' + statusBadge(r.status) + '</td>';
    h += '<td style="white-space:nowrap;color:var(--text-secondary)">' + esc(r.DateStartPetition || '') + '</td>';
    h += '</tr>';
  }
  h += '</tbody></table></div>';
  return h;
}

function renderPagination(current, total, fn) {
  let pages = [];
  if (total <= 9) {
    for (let i = 1; i <= total; i++) pages.push(i);
  } else {
    pages.push(1);
    if (current > 3) pages.push('…');
    for (let i = Math.max(2, current - 1); i <= Math.min(total - 1, current + 1); i++) pages.push(i);
    if (current < total - 2) pages.push('…');
    pages.push(total);
  }
  let h = '<div class="pagination">';
  if (current > 1) h += '<a onclick="' + fn + '(' + (current - 1) + ')" style="cursor:pointer">← Prev</a>';
  for (const p of pages) {
    if (p === '…') h += '<span style="padding:.3rem .4rem;color:var(--text-secondary);font-size:.8rem">…</span>';
    else if (p === current) h += '<a class="current">' + p + '</a>';
    else h += '<a onclick="' + fn + '(' + p + ')" style="cursor:pointer">' + p + '</a>';
  }
  if (current < total) h += '<a onclick="' + fn + '(' + (current + 1) + ')" style="cursor:pointer">Next →</a>';
  h += '</div>';
  return h;
}

// ── Top by Signatures ──────────────────────────────────────────────

async function loadTop() {
  const n = el('top-n').value;
  loading('top-result');
  try {
    const r = await fetch('/api/top?n=' + n);
    const d = await r.json();
    if (d.detail) throw d.detail;
    el('top-result').innerHTML = topTable(d.data || []);
  } catch (e) { errMsg('top-result', e); }
}

function topTable(rows) {
  if (!rows.length) return '<p style="padding:1rem 1.25rem;color:var(--text-secondary);font-size:.8rem">No data.</p>';
  let h = '<div class="overflow-table"><table><thead><tr>';
  h += '<th style="width:32px">#</th><th>Title</th><th style="text-align:right">Signatures</th>';
  h += '</tr></thead><tbody>';
  rows.forEach((r, i) => {
    h += '<tr>';
    h += '<td style="color:var(--text-secondary)">' + (i + 1) + '</td>';
    h += '<td>' + esc(trunc(r.title, 60)) + '</td>';
    h += '<td style="text-align:right;font-weight:700">' + Number(r.count).toLocaleString() + '</td>';
    h += '</tr>';
  });
  h += '</tbody></table></div>';
  return h;
}

// ── By Status ──────────────────────────────────────────────────────

async function loadStatus() {
  loading('status-result');
  try {
    const r = await fetch('/api/by-status');
    const d = await r.json();
    if (d.detail) throw d.detail;
    el('status-result').innerHTML = statusTable(d.data || []);
  } catch (e) { errMsg('status-result', e); }
}

function statusTable(rows) {
  if (!rows.length) return '<p style="padding:1rem 1.25rem;color:var(--text-secondary);font-size:.8rem">No data.</p>';
  const total = rows.reduce((s, r) => s + r.cnt, 0);
  let h = '<div style="padding:.75rem 1.25rem;display:flex;flex-direction:column;gap:.625rem">';
  for (const r of rows) {
    const pct = total ? (100 * r.cnt / total).toFixed(1) : 0;
    h += '<div>';
    h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.3rem">';
    h += '<span style="font-size:.8125rem">' + statusBadge(r.status) + '</span>';
    h += '<span style="font-size:.78rem;color:var(--text-secondary)">' + Number(r.cnt).toLocaleString() + ' &nbsp;·&nbsp; ' + pct + '%</span>';
    h += '</div>';
    h += '<div style="background:var(--border);border-radius:4px;height:5px;overflow:hidden">';
    h += '<div style="background:var(--accent);height:100%;width:' + pct + '%;border-radius:4px;transition:width .4s ease"></div>';
    h += '</div>';
    h += '</div>';
  }
  h += '</div>';
  return h;
}

// ── Search ─────────────────────────────────────────────────────────

async function loadSearch() {
  const q = el('search-q').value.trim();
  if (!q) { el('search-result').innerHTML = '<div class="alert alert-error" style="margin-top:.5rem">Enter a topic to search.</div>'; return; }
  loading('search-result');
  try {
    const limit = el('search-limit').value;
    const r = await fetch('/api/search?q=' + encodeURIComponent(q) + '&limit=' + limit);
    const d = await r.json();
    if (d.detail) throw d.detail;
    el('search-result').innerHTML = searchTable(d.data || []);
  } catch (e) { errMsg('search-result', e); }
}

// ── Autocomplete ───────────────────────────────────────────────────

(function() {
  const input = el('search-q');
  const box   = el('ac-box');
  let timer   = null;
  let active  = -1;

  function items() { return box.querySelectorAll('.ac-item'); }

  function hide() {
    box.setAttribute('hidden', '');
    active = -1;
  }

  function setActive(idx) {
    const els = items();
    active = Math.max(-1, Math.min(idx, els.length - 1));
    els.forEach((el, i) => el.classList.toggle('ac-active', i === active));
    if (active >= 0) els[active].scrollIntoView({ block: 'nearest' });
  }

  function pick(title) {
    input.value = title;
    hide();
    loadSearch();
  }

  async function suggest() {
    const q = input.value.trim();
    if (q.length < 1) { hide(); return; }
    try {
      const r = await fetch('/api/suggest?q=' + encodeURIComponent(q));
      const d = await r.json();
      const titles = d.data || [];
      if (!titles.length) { hide(); return; }

      active = -1;
      box.innerHTML = titles.map(t =>
        '<div class="ac-item">' + esc(t) + '</div>'
      ).join('');

      box.querySelectorAll('.ac-item').forEach(function(item) {
        item.addEventListener('mousedown', function(e) {
          e.preventDefault();
          pick(this.textContent);
        });
      });

      box.removeAttribute('hidden');
    } catch(_) { hide(); }
  }

  input.addEventListener('input', function() {
    clearTimeout(timer);
    timer = setTimeout(suggest, 300);
  });

  input.addEventListener('keydown', function(e) {
    const els = items();
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      setActive(active + 1);
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      setActive(active - 1);
    } else if (e.key === 'Enter') {
      if (active >= 0 && els[active]) {
        e.preventDefault();
        pick(els[active].textContent);
      } else {
        hide();
        loadSearch();
      }
    } else if (e.key === 'Escape') {
      hide();
    }
  });

  input.addEventListener('blur', function() {
    setTimeout(hide, 150);
  });

  document.addEventListener('click', function(e) {
    if (!input.contains(e.target) && !box.contains(e.target)) hide();
  });
})();

function searchTable(rows) {
  if (!rows.length) return '<p style="color:var(--text-secondary);font-size:.8rem">No results found.</p>';
  let h = '<p style="margin-bottom:.6rem;font-size:.8rem;color:var(--text-secondary)">Found <strong style="color:var(--text-primary)">' + rows.length + '</strong> result' + (rows.length !== 1 ? 's' : '') + '</p>';
  h += '<div class="overflow-table"><table><thead><tr>';
  h += '<th>Title</th><th style="text-align:right">Signatures</th><th>Kind</th><th>Status</th>';
  h += '</tr></thead><tbody>';
  for (const r of rows) {
    h += '<tr>';
    h += '<td>' + esc(trunc(r.title, 72)) + '</td>';
    h += '<td style="text-align:right;font-weight:600">' + Number(r.count).toLocaleString() + '</td>';
    h += '<td>' + esc(r.kind) + '</td>';
    h += '<td>' + statusBadge(r.status) + '</td>';
    h += '</tr>';
  }
  h += '</tbody></table></div>';
  return h;
}

// ── Chart ──────────────────────────────────────────────────────────

function showChart() {
  const name = el('chart-name').value;
  el('chart-result').innerHTML = '<img src="/api/charts/' + name + '" alt="' + esc(name) + '" style="max-width:100%;border-radius:var(--radius);display:block">';
}

// ── Pipeline / DB ──────────────────────────────────────────────────

function toast(msg, ok) {
  const t = el('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (ok ? 'toast-ok' : 'toast-err');
  setTimeout(() => { t.className = 'toast'; }, 3000);
}

async function clearDB() {
  if (!confirm('Clear the database? All loaded data will be removed.')) return;
  const btn = el('btn-clear');
  btn.disabled = true;
  try {
    const r = await fetch('/api/db', { method: 'DELETE' });
    const d = await r.json();
    if (r.ok) { toast('Database cleared', true); el('pipeline-status').textContent = 'DB cleared'; }
    else toast('Error: ' + (d.detail || r.statusText), false);
  } catch (e) { toast('Error: ' + e.message, false); }
  btn.disabled = false;
}

async function runPipeline() {
  const btn = el('btn-pipeline');
  const spinner = el('pipeline-spinner');
  const status = el('pipeline-status');
  btn.disabled = true;
  spinner.style.display = 'inline-block';
  status.textContent = 'Downloading…';
  try {
    const r = await fetch('/api/pipeline', { method: 'POST' });
    const data = await r.json();
    if (r.ok) {
      status.textContent = data.rows_loaded + ' rows loaded';
      toast('Pipeline complete: ' + data.rows_loaded + ' rows', true);
      loadPetitions(1);
      loadTop();
      loadStatus();
    } else {
      status.textContent = 'Error: ' + (data.detail || r.statusText);
      toast('Pipeline failed', false);
    }
  } catch (e) {
    status.textContent = 'Error: ' + e.message;
    toast('Failed: ' + e.message, false);
  }
  btn.disabled = false;
  spinner.style.display = 'none';
}

// ── Init ───────────────────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', () => {
  loadPetitions(1);
  loadTop();
  loadStatus();
  showChart();
});
</script>
{% endblock %}
